name: Rust CI

on:
  push:
    branches: [ "main", "feature/**" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-lint:
    name: Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, clippy
          rustflags: ""

      - name: Build
        run: cargo build --verbose

      - name: Lint
        run: |
          cargo fmt -- --check
          cargo clippy --all-targets --all-features

  test:
    name: Test
    needs: build-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""

      - name: Unit tests
        run: cargo test --verbose -- --test-threads=1

      - name: Install ephemeris data packages
        run: |
          pip install --timeout 600 --retries 5 \
            naif-de440 \
            jpl-small-bodies-de441-n16

      - name: Resolve data paths
        run: |
          echo "ASSIST_PLANETS_PATH=$(python3 -c 'import naif_de440; print(naif_de440.de440)')" >> $GITHUB_ENV
          echo "ASSIST_ASTEROIDS_PATH=$(python3 -c 'import jpl_small_bodies_de441_n16 as sb; print(sb.de441_n16)')" >> $GITHUB_ENV

      - name: Integration tests
        # CC=clang matches the recommended build flag set (see build.rs
        # comment on `-flto=thin`). GitHub's Ubuntu runners ship clang by
        # default; no extra install step needed.
        run: CC=clang cargo test --release --verbose -- --test-threads=1
        timeout-minutes: 15
